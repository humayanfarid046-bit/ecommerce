# Full stack on one host (VPS / dedicated server)
# Copy .env.example → .env.deploy, fill Firebase + Razorpay + URLs, then:
#   docker compose -f docker-compose.prod.yml --env-file .env.deploy up -d --build
#
# After up: storefront http://localhost:3000 — API http://localhost:4000/health
# Browser must reach the API at a public URL in production; for local Docker use:
#   NEXT_PUBLIC_API_URL=http://localhost:4000

name: ecom-stack

services:
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: "4000"
    # When ready, add: env_file: [ ./server/.env ] (Firebase Admin, CORS_ORIGIN)
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
      # Browser calls API — use host-published port (not the Docker service name)
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    # For full storefront: add build-args / secrets for all NEXT_PUBLIC_* (Firebase, Razorpay) — see web/.env.example
    depends_on:
      api:
        condition: service_healthy
